<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" fill="none">
  <defs>
    <radialGradient id="glow" cx="0.5" cy="0.55" r="0.45">
      <stop offset="0" stop-color="#fffdf9" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#fffdf9" stop-opacity="0"/>
    </radialGradient>

    <!-- Top row cubes — catch the key light, brighter top bevel -->
    <linearGradient id="cube-top" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0"   stop-color="#dfe6ec" stop-opacity="0.78"/>
      <stop offset="0.55" stop-color="#7d8d9b" stop-opacity="0.45"/>
      <stop offset="1"   stop-color="#1e2832" stop-opacity="0.55"/>
    </linearGradient>

    <!-- Middle row — mid tones -->
    <linearGradient id="cube-mid" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0"   stop-color="#9fadb9" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#46535f" stop-opacity="0.55"/>
      <stop offset="1"   stop-color="#10171f" stop-opacity="0.7"/>
    </linearGradient>

    <!-- Tail cube — darkest, sits in shadow -->
    <linearGradient id="cube-dark" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0"   stop-color="#65737f" stop-opacity="0.5"/>
      <stop offset="1"   stop-color="#080d13" stop-opacity="0.85"/>
    </linearGradient>

    <!-- Chromatic edge hint -->
    <linearGradient id="rainbow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"    stop-color="#ff5577" stop-opacity="0.5"/>
      <stop offset="0.5"  stop-color="#55ff88" stop-opacity="0.5"/>
      <stop offset="1"    stop-color="#5577ff" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <!-- Atmospheric glow behind the cluster -->
  <circle cx="300" cy="265" r="200" fill="url(#glow)"/>

  <g stroke="#0c1118" stroke-width="0.7" stroke-opacity="0.65">
    <!-- Top-left cube (A) -->
    <rect x="216" y="170" width="80" height="80" rx="12" fill="url(#cube-top)"/>
    <!-- Top-right cube (B) -->
    <rect x="304" y="172" width="80" height="80" rx="12" fill="url(#cube-top)"/>
    <!-- Middle-left cube (C) -->
    <rect x="216" y="258" width="78" height="82" rx="12" fill="url(#cube-mid)"/>
    <!-- Middle-right cube (D) -->
    <rect x="304" y="260" width="78" height="78" rx="12" fill="url(#cube-mid)"/>
    <!-- Tail bottom cube (E) -->
    <rect x="256" y="346" width="74" height="74" rx="11" fill="url(#cube-dark)"/>
  </g>

  <!-- Key-light specular hits on top bevels -->
  <g stroke="#fffdf9" stroke-opacity="0.45" stroke-width="1.2" stroke-linecap="round" fill="none">
    <path d="M 224 178 L 286 178"/>
    <path d="M 312 180 L 374 180"/>
  </g>

  <!-- Faint chromatic split on the seams (where dispersion would read live) -->
  <g stroke-width="1.4" stroke-linecap="round" fill="none" opacity="0.55">
    <line x1="296" y1="172" x2="296" y2="252" stroke="url(#rainbow)"/>
    <line x1="294" y1="260" x2="294" y2="338" stroke="url(#rainbow)"/>
  </g>
</svg>
