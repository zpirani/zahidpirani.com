<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" fill="none">
  <defs>
    <radialGradient id="glow" cx="0.5" cy="0.55" r="0.4">
      <stop offset="0" stop-color="#6f879c" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#6f879c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="face-top" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#b9cad6" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#3a4d5e" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="face-light" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9eb2c1" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#2a3a48" stop-opacity="0.45"/>
    </linearGradient>
    <linearGradient id="face-mid" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#536b7c" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#1a2532" stop-opacity="0.65"/>
    </linearGradient>
    <linearGradient id="face-dark" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3d5160" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#0e151c" stop-opacity="0.75"/>
    </linearGradient>
    <linearGradient id="face-deepest" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#1a2532" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#06090d" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- Soft atmospheric glow behind the crystal -->
  <circle cx="300" cy="270" r="200" fill="url(#glow)"/>

  <!-- Faceted icosahedron silhouette, viewed off-axis -->
  <g transform="translate(300,250)" stroke="#0e151c" stroke-width="0.6" stroke-opacity="0.45">
    <!-- Top cap -->
    <polygon points="0,-150 -80,-58 80,-58" fill="url(#face-top)"/>
    <!-- Upper left -->
    <polygon points="-80,-58 -140,42 -55,52" fill="url(#face-light)"/>
    <!-- Upper centre right -->
    <polygon points="-80,-58 -55,52 80,-58" fill="url(#face-mid)"/>
    <polygon points="80,-58 55,52 -55,52" fill="url(#face-dark)"/>
    <!-- Upper right -->
    <polygon points="80,-58 140,42 55,52" fill="url(#face-light)"/>
    <!-- Bottom left -->
    <polygon points="-140,42 -55,52 -70,130" fill="url(#face-mid)"/>
    <polygon points="-55,52 0,150 -70,130" fill="url(#face-deepest)"/>
    <!-- Bottom centre -->
    <polygon points="-55,52 55,52 0,150" fill="url(#face-dark)"/>
    <!-- Bottom right -->
    <polygon points="55,52 70,130 0,150" fill="url(#face-deepest)"/>
    <polygon points="55,52 140,42 70,130" fill="url(#face-mid)"/>

    <!-- Faint internal axis hints (refraction shimmer) -->
    <line x1="0" y1="-150" x2="0" y2="150" stroke="#6f879c" stroke-opacity="0.12" stroke-width="0.6"/>
    <line x1="-140" y1="42" x2="140" y2="42" stroke="#6f879c" stroke-opacity="0.08" stroke-width="0.6"/>

    <!-- Chromatic edge hint -->
    <polygon points="0,-150 80,-58 55,52" fill="none" stroke="#fffdf9" stroke-opacity="0.22" stroke-width="0.6"/>
  </g>
</svg>
