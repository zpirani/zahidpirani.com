<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 750" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080F1E"/>
      <stop offset="0.45" stop-color="#0E2444"/>
      <stop offset="1" stop-color="#163666"/>
    </linearGradient>
  </defs>
  <rect width="1000" height="750" fill="url(#bg)"/>

  <!-- Stacked component variants — pill buttons of varying widths -->
  <g>
    <!-- Row 1: Buttons -->
    <rect x="280" y="240" width="120" height="42" rx="21" fill="#FBCE07"/>
    <rect x="416" y="240" width="120" height="42" rx="21" fill="none" stroke="#FBCE07" stroke-width="2"/>
    <rect x="552" y="240" width="168" height="42" rx="21" fill="#FFFFFF" fill-opacity="0.10" stroke="#FFFFFF" stroke-opacity="0.20"/>

    <!-- Row 2: Tags -->
    <rect x="280" y="305" width="78" height="28" rx="14" fill="#FFFFFF" fill-opacity="0.12"/>
    <rect x="374" y="305" width="64" height="28" rx="14" fill="#FFFFFF" fill-opacity="0.12"/>
    <rect x="454" y="305" width="92" height="28" rx="14" fill="#FFFFFF" fill-opacity="0.12"/>
    <rect x="562" y="305" width="72" height="28" rx="14" fill="#FFFFFF" fill-opacity="0.12"/>
    <rect x="650" y="305" width="70" height="28" rx="14" fill="#FFFFFF" fill-opacity="0.12"/>

    <!-- Row 3: Color tokens -->
    <circle cx="298" cy="394" r="20" fill="#FBCE07"/>
    <circle cx="350" cy="394" r="20" fill="#DD1D21"/>
    <circle cx="402" cy="394" r="20" fill="#EDEDF2"/>
    <circle cx="454" cy="394" r="20" fill="#9092B0"/>
    <circle cx="506" cy="394" r="20" fill="#22D3EE"/>
    <circle cx="558" cy="394" r="20" fill="#34D399"/>
    <circle cx="610" cy="394" r="20" fill="#163666"/>
    <circle cx="662" cy="394" r="20" fill="#080F1E" stroke="#FFFFFF" stroke-opacity="0.18"/>

    <!-- Row 4: Type ramp -->
    <rect x="280" y="450" width="220" height="14" rx="2" fill="#FFFFFF" fill-opacity="0.45"/>
    <rect x="280" y="476" width="180" height="10" rx="2" fill="#FFFFFF" fill-opacity="0.30"/>
    <rect x="280" y="496" width="140" height="8" rx="2" fill="#FFFFFF" fill-opacity="0.20"/>
  </g>
</svg>
