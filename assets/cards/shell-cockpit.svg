<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 750" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080F1E"/>
      <stop offset="0.45" stop-color="#0E2444"/>
      <stop offset="1" stop-color="#163666"/>
    </linearGradient>
  </defs>
  <rect width="1000" height="750" fill="url(#bg)"/>

  <!-- 4x2 grid of module tiles -->
  <g>
    <!-- Row 1 -->
    <rect x="180" y="225" width="150" height="115" rx="8" fill="#FFFFFF" fill-opacity="0.06" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <rect x="350" y="225" width="150" height="115" rx="8" fill="#FFFFFF" fill-opacity="0.06" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <rect x="520" y="225" width="150" height="115" rx="8" fill="#FBCE07" fill-opacity="0.20" stroke="#FBCE07" stroke-opacity="0.55"/>
    <rect x="690" y="225" width="150" height="115" rx="8" fill="#FFFFFF" fill-opacity="0.06" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <!-- Row 2 -->
    <rect x="180" y="360" width="150" height="115" rx="8" fill="#FFFFFF" fill-opacity="0.06" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <rect x="350" y="360" width="150" height="115" rx="8" fill="#FFFFFF" fill-opacity="0.06" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <rect x="520" y="360" width="150" height="115" rx="8" fill="#FFFFFF" fill-opacity="0.06" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <rect x="690" y="360" width="150" height="115" rx="8" fill="#FFFFFF" fill-opacity="0.06" stroke="#FFFFFF" stroke-opacity="0.10"/>
  </g>

  <!-- Inner accent lines on highlighted tile -->
  <g stroke="#FBCE07" stroke-opacity="0.7" stroke-width="2">
    <line x1="540" y1="255" x2="585" y2="255"/>
    <line x1="540" y1="275" x2="630" y2="275"/>
    <line x1="540" y1="295" x2="600" y2="295"/>
  </g>
</svg>
